apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-jakegaylor-com
  namespace: ai-jakegaylor-com
  labels:
    app: ai-jakegaylor-com
  annotations:
    # Restart the pod when the Infisical operator updates
    # ai-jakegaylor-com-app-secrets (RESEND_API_KEY is read at boot).
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-jakegaylor-com
  template:
    metadata:
      labels:
        app: ai-jakegaylor-com
    spec:
      containers:
        - name: ai-jakegaylor-com
          # `:latest` is mutable — the docker.yml workflow rebuilds on
          # every push to main. imagePullPolicy: Always forces a manifest
          # check on pod start so `kubectl rollout restart` picks up the
          # new digest.
          image: docker.io/jhgaylor/jake-gaylor-com-mcp-server:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3000"
            - name: EMAIL_FROM
              # Must be on a domain verified in the Resend dashboard.
              value: "AI Assistant <ai-assistant@updates.inevitable.fyi>"
          envFrom:
            # RESEND_API_KEY (contact_candidate tool) — materialized from
            # Infisical by the operator (see infisicalsecret.yaml). optional
            # so the pod still starts before the operator has synced.
            - secretRef:
                name: ai-jakegaylor-com-app-secrets
                optional: true
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            # Startup fetches resume + website text from jakegaylor.com
            # before the listener comes up, so give it some slack.
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
