apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  # Runtime secrets come from the self-hosted Infisical (magpie). The operator
  # authenticates with the SOPS-encrypted machine-identity creds and
  # materializes the `ai-jakegaylor-com-app-secrets` Secret (RESEND_API_KEY)
  # the Deployment consumes.
  - ai-jakegaylor-com-infisical-auth.enc.yaml
  - infisicalsecret.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
  - certificates.yaml

images:
  # Pinned to the immutable per-commit tag. The docker.yml workflow bumps
  # newTag after every image build on main; Flux sees the manifest change
  # and rolls the deployment. Do not edit by hand — CI owns this line.
  - name: docker.io/jhgaylor/jake-gaylor-com-mcp-server
    newTag: sha-612bfb4
