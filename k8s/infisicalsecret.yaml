# Pulls runtime secrets from the self-hosted Infisical (magpie)
# `ai-jakegaylor-com` project and materializes them into a native K8s Secret
# (`ai-jakegaylor-com-app-secrets`) the Deployment reads via envFrom.
# Holds RESEND_API_KEY (contact_candidate email tool).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: ai-jakegaylor-com-secrets
  namespace: ai-jakegaylor-com
spec:
  # Internal Service DNS — no Traefik/Cloudflare round-trip for in-cluster reconciles.
  hostAPI: http://infisical.infisical.svc.cluster.local:8080
  resyncInterval: 60
  authentication:
    # Kubernetes-native auth: no stored credential (see home-cloud
    # docs/sops-to-infisical-migration.md, Phase 2 pattern).
    kubernetesAuth:
      # ai-jakegaylor-com-operator machine identity on the Infisical server.
      identityId: b94bcb86-8007-47ca-886e-57c6fa973a0c
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: ai-jakegaylor-com-infisical
        namespace: ai-jakegaylor-com
      secretsScope:
        projectSlug: ai-jakegaylor-com-x-ic-n
        envSlug: prod
        secretsPath: "/"
  managedSecretReference:
    secretName: ai-jakegaylor-com-app-secrets
    secretNamespace: ai-jakegaylor-com
    # Orphan = operator overwrites in-place / the Secret survives CR deletion.
    creationPolicy: Orphan
