name: Build and Push JakeGaylor MCP Server Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: jake-gaylor-com-mcp-server
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: jhgaylor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # write: the deploy step below commits the new image tag back to main.
      contents: write

    steps:
      - name: Checkout MCP Server repository checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./
          # arm64 included for the home-cloud k3s nodes (Apple Silicon
          # Lima VMs) — a single-arch amd64 image fails at pull there.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps deploy: pin k8s/kustomization.yaml to this build's immutable
      # sha-<commit> tag and push. Flux watches this repo, sees the manifest
      # change, and rolls the deployment. GITHUB_TOKEN pushes don't trigger
      # workflows, so this can't loop.
      - name: Bump deployed image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          sed -i "s/newTag: .*/newTag: ${TAG}/" k8s/kustomization.yaml
          if git diff --quiet k8s/kustomization.yaml; then
            echo "Tag already at ${TAG}, nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "Deploy ${TAG}"
          # Tolerate pushes that landed on main while the image was building.
          git pull --rebase origin main
          git push origin main 